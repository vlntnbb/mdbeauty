<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f5f9;
      --card: #ffffff;
      --border: rgba(33, 43, 54, 0.18);
      --fg: #152233;
      --muted: #586474;
      --accent: #0f6fd6;
      --protected-bg: rgba(15, 111, 214, 0.08);
      --protected-border: rgba(15, 111, 214, 0.35);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f141b;
        --card: #141d27;
        --border: rgba(214, 225, 238, 0.24);
        --fg: #e1e9f4;
        --muted: #a6b5c7;
        --accent: #7ac0ff;
        --protected-bg: rgba(122, 192, 255, 0.13);
        --protected-border: rgba(122, 192, 255, 0.38);
      }
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "Avenir Next", "Iowan Old Style", serif;
    }
    #editor-wrap {
      box-sizing: border-box;
      min-height: 100vh;
      padding: 18px;
    }
    #editor {
      max-width: 1020px;
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 16px 44px rgba(0,0,0,0.09);
      padding: 20px 24px;
      box-sizing: border-box;
    }
    .ProseMirror {
      outline: none;
      min-height: calc(100vh - 96px);
      white-space: pre-wrap;
    }
    .ProseMirror p,
    .ProseMirror li,
    .ProseMirror td,
    .ProseMirror th {
      line-height: 1.62;
      color: var(--muted);
      font-size: 1.03rem;
    }
    .ProseMirror h1,
    .ProseMirror h2,
    .ProseMirror h3,
    .ProseMirror h4,
    .ProseMirror h5,
    .ProseMirror h6 {
      color: var(--fg);
      line-height: 1.22;
      margin: 1.05em 0 0.52em;
      font-family: "Avenir Next Demi Bold", "Gill Sans", sans-serif;
      letter-spacing: 0.01em;
    }
    .ProseMirror h1 { font-size: 1.98rem; margin-top: 0.05em; }
    .ProseMirror h2 { font-size: 1.58rem; }
    .ProseMirror h3 { font-size: 1.3rem; }
    .ProseMirror ul,
    .ProseMirror ol {
      padding-left: 1.35rem;
    }
    .ProseMirror a {
      color: var(--accent);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }
    .ProseMirror blockquote {
      border-left: 3px solid var(--accent);
      margin: 1rem 0;
      padding: 0.15rem 0 0.15rem 1rem;
      color: var(--muted);
    }
    .ProseMirror pre {
      background: rgba(127, 136, 148, 0.14);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
    }
    .ProseMirror code {
      font-family: "SF Mono", "Menlo", monospace;
      font-size: 0.91em;
    }
    .ProseMirror table {
      border-collapse: collapse;
      width: 100%;
    }
    .ProseMirror td,
    .ProseMirror th {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
    }
    .protected-card {
      border: 1px solid var(--protected-border);
      background: var(--protected-bg);
      border-left-width: 4px;
      border-radius: 10px;
      padding: 10px;
      margin: 10px 0;
      color: var(--fg);
      display: grid;
      gap: 6px;
    }
    .protected-card button {
      justify-self: start;
      border: 1px solid var(--protected-border);
      background: transparent;
      color: var(--fg);
      border-radius: 8px;
      padding: 4px 9px;
      font-size: 12px;
      cursor: pointer;
    }
    .protected-card button:hover {
      background: rgba(127, 136, 148, 0.14);
    }
  </style>
</head>
<body>
  <div id="editor-wrap">
    <div id="editor"></div>
  </div>
  <script src="./editor.bundle.js"></script>
</body>
</html>
